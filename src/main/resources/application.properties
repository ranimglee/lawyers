spring.application.name=lawyer


### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:3306/juristdb?&createDatabaseIfNotExist=true&useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
# Server
server.port=8080
spring.mail.host=smtp.gmail.com
spring.mail.port=587


spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

jwt.secret=YourSuperLongSecureSecretKeyHereWith32CharsOrMore
jwt.expiration=86400000
app.admin.email=admin@system.com
app.admin.password=admin123
